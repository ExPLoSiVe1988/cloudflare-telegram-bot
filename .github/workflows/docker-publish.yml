name: Docker Build and Push

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up QEMU for multi-arch build
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Docker tags
        id: set-tags
        run: |
          echo "LATEST_TAG=explosive1988/cfbot:latest" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            echo "VERSION_TAG=explosive1988/cfbot:${VERSION}" >> $GITHUB_ENV
            {
              echo "DOCKER_TAGS<<EOF"
              echo "explosive1988/cfbot:latest"
              echo "explosive1988/cfbot:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "VERSION_TAG=" >> $GITHUB_ENV
            {
              echo "DOCKER_TAGS<<EOF"
              echo "explosive1988/cfbot:latest"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_TAGS }}
