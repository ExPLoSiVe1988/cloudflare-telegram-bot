# docker-compose.yml (برای پوشه تستی)
services:
  cfbot:
    build: .
    # image: explosive1988/cfbot:latest-test 
    container_name: cfbot-test 
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./bot_data.pickle:/app/bot_data.pickle
      - ./nodes_cache.json:/app/nodes_cache.json
